esphome:
  name: knob-mat

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "knob-mat Fallback Hotspot"

captive_portal:

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_pass
    
binary_sensor:
  # ----------------------------------------------------
  # ROTARY ENCODER BUTTON (Pin D2)
  # ----------------------------------------------------
  - platform: gpio
    id: button_kitchen
    pin:
      number: D2
      mode: INPUT_PULLUP
      inverted: True
    on_multi_click:
    - timing:
      - ON for at most 1s
      - OFF for at most 1s
      - ON for at most 1s
      - OFF for at least 0.2s
      then:
        - homeassistant.event:
            event: esphome.media_controller_action
            data:
              action: dial_double_click
        - logger.log: "Event fired: dial_double_click (Intended: Prev Track)"
    - timing:
      - ON for at least 0.5s
      - OFF for at least 0.1s
      then:
        - homeassistant.event:
            event: esphome.media_controller_action
            data:
              action: dial_long_press
        - logger.log: "Event fired: dial_long_press (Intended: Mute Toggle)"
    - timing:
      - ON for at most .49s
      - OFF for at least 0.25s
      then:
        - homeassistant.event:
            event: esphome.media_controller_action
            data:
              action: dial_single_click
        - logger.log: "Event fired: dial_single_click (Intended: Next Track)"

# ----------------------------------------------------
  # DEDICATED PUSH BUTTON (Pin D5)
  # ----------------------------------------------------
  - platform: gpio
    id: button_dedicated_media
    pin:
      number: D5
      mode: INPUT_PULLUP
      inverted: true
    on_multi_click:
    - timing:
      - ON for at most 1s
      - OFF for at most 1s
      - ON for at most 1s
      - OFF for at least 0.2s
      then:
        - homeassistant.event:
            event: esphome.media_controller_action
            data:
              action: dedicated_double_click
        - logger.log: "Event fired: dedicated_double_click"
    - timing:
      - ON for at least 0.5s 
      - OFF for at least 0.1s
      then:
        - homeassistant.event:
            event: esphome.media_controller_action
            data:
              action: dedicated_long_press
        - logger.log: "Event fired: dedicated_long_press"
    - timing:
      - ON for at most .49s
      - OFF for at least 0.25s
      then:
        - homeassistant.event:
            event: esphome.media_controller_action
            data:
              action: dedicated_single_click
        - logger.log: "Event fired: dedicated_single_click"

sensor:
  # ----------------------------------------------------
  # ROTARY ENCODER DIAL (Pins D4, D3)
  # ----------------------------------------------------
  - platform: rotary_encoder
    id: knob_kitchen
    pin_a: D4
    pin_b: D3
    min_value: -3
    max_value: 3
    on_value_range:
      - above: 2
        then:
          - script.execute: volume_up
      - below: -2
        then:
          - script.execute: volume_down
              
script:
  - id: volume_up
    then:
      - homeassistant.service:
          service: media_player.volume_up
          data:
            entity_id: media_player.office_mini
      - logger.log: "vol up trigger"
      - sensor.rotary_encoder.set_value:
          id: knob_kitchen
          value: 0
          
  - id: volume_down
    then:
      - homeassistant.service:
          service: media_player.volume_down
          data:
            entity_id: media_player.office_mini
      - logger.log: "vol down trigger"
      - sensor.rotary_encoder.set_value:
          id: knob_kitchen
          value: 0

# ----------------------------------------------------
# 1. DEFINE THE PHYSICAL PIN FOR THE LED
# ----------------------------------------------------
output:
  - platform: gpio
    id: led_output
    pin: D8

# ----------------------------------------------------
# 2. CREATE THE LIGHT ENTITY
# ----------------------------------------------------
light:
  - platform: binary
    name: "Media Status LED"
    id: status_led
    output: led_output

# ----------------------------------------------------
# 3. WATCH HOME ASSISTANT & AUTOMATE THE LED
# ----------------------------------------------------
text_sensor:
  - platform: homeassistant
    id: media_state
    entity_id: media_player.office_mini
    # Every time the speaker changes state, evaluate this rule:
    on_value:
      - if:
          condition:
            text_sensor.state:
              id: media_state
              state: 'playing'
          then:
            - light.turn_on: status_led
            - logger.log: "Speaker is playing. LED ON."
          else:
            - light.turn_off: status_led
            - logger.log: "Speaker is not playing. LED OFF."